---
###############################################################################
# Default ACME Package Dependencies
###############################################################################
# Default required packages for ACME install.

acme_default_packages:
  - 'gnupg2'
  - 'python3-pip'
  - 'python3-venv'
  - 'pipx'

###############################################################################
# Default ACME User Group
###############################################################################
# Default group settings if an ACME user is force created.

acme_default_group:
  name: 'acme'
  gid:  700

###############################################################################
# Default ACME User Account
###############################################################################
# Default user settings if an ACME user is force created.
#
# Logins are disabled.

acme_default_user:
  name:            'acme'
  group:           'acme'
  groups:
    - 'ssh'
  uid:             700
  shell:           '/bin/bash'
  home:            '/etc/acme'
  create_home:     true
  password:        '!'
  password_lock:   true
  update_password: 'always'
  expires:         -1
  system:          true
